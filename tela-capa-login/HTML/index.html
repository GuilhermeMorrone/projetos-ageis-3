<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Capa</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="icon" type="image/png" href="../IMG/tray_logo.jpg">
</head>
<body>
    <header class="header-tray">
        <img src="../IMG/tray-novamarca.png" alt="Logo Tray" class="logo-tray">
      </header>
    <div class="overlay"></div>

    <div class="panel" id="panel">
        <div class="content" id="initialContent">
        <h1 class="frase"><span id="typed-text"><O seu feedback é muito importante></span></h1>
        <button onclick="abrirLogin()" id="startBtn">Fazer Login</button>
    </div>

        <form class="login-form" id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
        </form>
    </div>

  <script src="../JS/script.js"></script>
</body>
</html>
